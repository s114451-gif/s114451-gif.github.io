<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 午餐命運之輪</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            color: #ffd700;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        p {
            color: #ccc;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }
        .q-group {
            margin-bottom: 20px;
            text-align: left;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 8px;
        }
        .q-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #e0e0ff;
        }
        label {
            display: block;
            margin: 8px 0;
            cursor: pointer;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        label:hover {
            color: #ffd700;
        }
        input[type="radio"] {
            margin-right: 10px;
            accent-color: #ffd700;
        }
        .btn {
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.6);
        }
        #result-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 215, 0, 0.1);
            border: 2px dashed #ffd700;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }
        #result-text {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffd700;
            margin: 10px 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ 命運之輪 ✨</h2>
    <p>傾聽你靈魂的飢餓感，做出直覺的選擇：</p>
    
    <form id="lunchForm">
        <div class="q-group">
            <div class="q-title">Q1: 今天想喝熱湯，還是吃乾的？</div>
            <label><input type="radio" name="soup" value="yes" checked> 想要有熱湯喝</label>
            <label><input type="radio" name="soup" value="no"> 不要湯，乾的就好</label>
        </div>

        <div class="q-group">
            <div class="q-title">Q2: 主食想要吃飯，還是麵食/其他？</div>
            <label><input type="radio" name="rice" value="yes" checked> 要吃飯（便當、丼飯）</label>
            <label><input type="radio" name="rice" value="no"> 吃麵或其它澱粉（拉麵、披薩）</label>
        </div>

        <div class="q-group">
            <div class="q-title">Q3: 想吃邪惡重口味，還是清淡點？</div>
            <label><input type="radio" name="heavy" value="yes" checked> 越邪惡、越滿足越好！</label>
            <label><input type="radio" name="heavy" value="no"> 偏向清淡健康</label>
        </div>

        <button type="button" class="btn" onclick="drawLunch()">啟動命運之輪 🎲</button>
    </form>

    <div id="result-box">
        <div>✨ 宇宙指引你的午餐首選 ✨</div>
        <div id="result-text">⏳ 感應中...</div>
        <div style="font-size: 0.85rem; color: #aaa; margin-top: 5px;">不要再猶豫了，快去訂餐吧！</div>
    </div>
</div>

<script>
    const lunchPool = [
        { name: "日式拉麵", soup: true, rice: false, heavy: true },
        { name: "熱騰騰的小火鍋", soup: true, rice: true, heavy: true },
        { name: "台式便當/乾麵", soup: false, rice: true, heavy: false },
        { name: "健康水煮餐盒", soup: false, rice: true, heavy: false },
        { name: "義大利麵/披薩", soup: false, rice: false, heavy: true },
        { name: "麥當勞/炸雞速食", soup: false, rice: false, heavy: true },
        { name: "超商簡單吃", soup: false, rice: false, heavy: false },
        { name: "牛肉麵/水餃", soup: true, rice: false, heavy: false }
    ];

    function drawLunch() {
        // 1. 取得選擇（改回最乾淨的 radio name 撈法）
        const wantSoup = document.querySelector('input[name="soup"]:checked').value === "yes";
        const wantRice = document.querySelector('input[name="rice"]:checked').value === "yes";
        const wantHeavy = document.querySelector('input[name="heavy"]:checked').value === "yes";

        // 2. 篩選符合條件的餐廳
        let candidates = lunchPool.filter(item => {
            let score = 0;
            if (item.soup === wantSoup) score++;
            if (item.rice === wantRice) score++;
            if (item.heavy === wantHeavy) score++;
            return score >= 2;
        });

        if (candidates.length === 0) {
            candidates = lunchPool;
        }

        // 3. 隨機抽選
        const randomIndex = Math.floor(Math.random() * candidates.length);
        const finalChoice = candidates[randomIndex].name;

        // 4. 渲染到網頁畫面上
        const resultBox = document.getElementById('result-box');
        const resultText = document.getElementById('result-text');
        
        if (resultBox && resultText) {
            resultBox.style.display = 'block';
            resultText.innerText = `【 ${finalChoice} 】`;
        } else {
            console.error("找不到結果區塊的 ID！");
        }
    }
</script>

</body>
</html>
