<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 潛意識色彩與形狀塔羅占卜</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #12121a, #1a1a2e);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            color: #ffd700;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 1.8rem;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        .subtitle {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        .q-group {
            margin-bottom: 25px;
            text-align: left;
            background: rgba(255, 255, 255, 0.02);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .q-title {
            font-size: 1.05rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #e0e0ff;
            letter-spacing: 1px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        label {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
        }
        label:hover {
            background: rgba(255, 215, 0, 0.05);
            border-color: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }
        input[type="radio"] {
            margin-right: 10px;
            accent-color: #ffd700;
            transform: scale(1.1);
        }
        /* 視覺裝飾 */
        .color-preview {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 8px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .shape-icon {
            margin-right: 8px;
            font-size: 1.1rem;
        }
        .btn {
            background: linear-gradient(45deg, #da4453, #89216b);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.15rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 20px rgba(137, 33, 107, 0.4);
            transition: all 0.3s;
            width: 100%;
            letter-spacing: 2px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(218, 68, 83, 0.6);
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            color: #000;
        }
